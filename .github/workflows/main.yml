name: primeira-pipeline
on: 
  push:
    branches: ["main"]
  workflow_dispatch:   
jobs:
 primeiro-job:
   name: "Meu Primeiro Job"
   runs-on: ubuntu-latest
   steps:
     - name: "Minha primeira Action"
       run: echo "Hello World !!!"
     - name: "Segunda Action"
       run: |
         echo "Você criou seu primeiro workflow"
         echo "Parabéns"
     - name: "Script Python"
       run: |
         variavel = "Hello World"
         print(variavel)
       shell: python  
 segundo-job:  
   name: "Segundo Job"
   runs-on: ubuntu-latest
   needs: [primeiro-job]
   steps:
     - name: "Verificação da versão do Node JS atual"
       run: node --version
     - name: "Definição da versão 24.18.0 do NodeJS"
       uses: actions/setup-node@v4 
       with:
         node-version: '24.18.0'
     - name: "Verificação da versão do Node depois da execução da Action"
       run: node --version    



  
